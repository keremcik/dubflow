<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DubFlow AI | Tester Portal</title>
    <style>
        :root { --bg: #030712; --card: #111827; --primary: #38bdf8; --secondary: #818cf8; --text: #f3f4f6; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 90%; max-width: 420px; background: var(--card); padding: 30px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        h1 { font-size: 2rem; margin: 10px 0; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #9ca3af; margin-bottom: 25px; font-size: 0.95rem; }
        .step { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 18px; margin-bottom: 12px; text-align: left; border: 1px solid rgba(255,255,255,0.05); }
        .step-n { font-size: 0.7rem; color: var(--primary); font-weight: bold; text-transform: uppercase; }
        .btn { display: block; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #000; text-decoration: none; padding: 14px; border-radius: 14px; font-weight: bold; margin-top: 10px; font-size: 0.9rem; transition: opacity 0.2s; text-align: center; }
        .info { margin-top: 20px; padding: 12px; background: rgba(56, 189, 248, 0.1); border-radius: 12px; font-size: 0.8rem; color: var(--primary); }
    </style>
</head>
<body>
<div class="container">
    <div style="font-size: 3rem;">🎙️</div>
    <h1>DubFlow AI</h1>
    <p>Düzce'den dünyaya! Test grubumuza katılarak bize güç ver.</p>
    
    <div class="step">
        <span class="step-n">Adım 1</span><br><b>Google Gruba Katıl</b>
        <a href="https://groups.google.com/g/dubflow-test-ekibi" class="btn">Gruba Katıl</a>
    </div>

    <div class="step">
        <span class="step-n">Adım 2</span><br><b>Testi Etkinleştir</b>
        <a href="BURAYA_WEB_LINKINI_YAPISTIR" class="btn">Onay Ver</a>
    </div>

    <div class="step">
        <span class="step-n">Adım 3</span><br><b>Uygulamayı Yükle</b>
        <a href="BURAYA_ANDROID_LINKINI_YAPISTIR" class="btn">Play Store'dan İndir</a>
    </div>

    <div class="info">⚠️ Google kuralları gereği lütfen uygulamayı 14 gün boyunca silmeyin.</div>
</div>
</body>
</html>
